version: "2"
linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - copyloopvar
    - cyclop
    - dupl
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - forbidigo
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goheader
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - makezero
    - mnd
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - predeclared
    - promlinter
    - reassign
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - testifylint
    - testpackage
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
  settings:
    modernize:
      # List of analyzers to disable.
      # By default, all analyzers are enabled.
      disable:
        # Replace interface{} with any.
        - any
        # Replace []byte(fmt.Sprintf) with fmt.Appendf.
        - fmtappendf
        # Remove redundant re-declaration of loop variables.
        - forvar
        # Replace explicit loops over maps with calls to maps package.
        - mapsloop
        # Replace if/else statements with calls to min or max.
        - minmax
        # Simplify code by using go1.26's new(expr).
        - newexpr
        # Suggest replacing omitempty with omitzero for struct fields.
        - omitzero
        # Remove obsolete //+build comments.
        - plusbuild
        # Replace 3-clause for loops with for-range over integers.
        - rangeint
        # Replace reflect.TypeOf(x) with TypeFor[T]().
        - reflecttypefor
        # Replace loops with slices.Contains or slices.ContainsFunc.
        - slicescontains
        # Replace sort.Slice with slices.Sort for basic types.
        - slicessort
        # Use iterators instead of Len/At-style APIs.
        - stditerators
        # Replace strings.Index etc. with strings.Cut.
        - stringscut
        # Replace HasPrefix/TrimPrefix with CutPrefix.
        - stringscutprefix
        # Replace ranging over Split/Fields with SplitSeq/FieldsSeq.
        - stringsseq
        # Replace += with strings.Builder.
        - stringsbuilder
        # Replace context.WithCancel with t.Context in tests.
        - testingcontext
        # Replace unsafe pointer arithmetic with function calls.
        - unsafefuncs
        # Replace wg.Add(1)/go/wg.Done() with wg.Go.
        - waitgroup
    cyclop:
      max-complexity: 30
      package-average: 10
    errcheck:
      check-type-assertions: true
    funlen:
      lines: 100
      statements: 50
    gocognit:
      min-complexity: 20
    gocritic:
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false
    gomodguard:
      blocked:
        modules:
          - github.com/golang/protobuf:
              recommendations:
                - google.golang.org/protobuf
              reason: see https://developers.google.com/protocol-buffers/docs/reference/go/faq#modules
          - github.com/satori/go.uuid:
              recommendations:
                - github.com/google/uuid
              reason: satori's package is not maintained
          - github.com/gofrs/uuid:
              recommendations:
                - github.com/google/uuid
              reason: 'see recommendation from dev-infra team: https://confluence.gtforge.com/x/gQI6Aw'
    govet:
      disable:
        - fieldalignment
      enable-all: true
      settings:
        shadow:
          strict: true
    mnd:
      ignored-functions:
        - os.Chmod
        - os.Mkdir
        - os.MkdirAll
        - os.OpenFile
        - os.WriteFile
        - prometheus.ExponentialBuckets
        - prometheus.ExponentialBucketsRange
        - prometheus.LinearBuckets
        - strconv.FormatFloat
        - strconv.FormatInt
        - strconv.FormatUint
        - strconv.ParseFloat
        - strconv.ParseInt
        - strconv.ParseUint
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-no-explanation:
        - funlen
        - gocognit
        - lll
    rowserrcheck:
      packages:
        - github.com/jmoiron/sqlx
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - lll
        source: ^//\s*go:generate\s
      - linters:
          - godot
        source: (noinspection|TODO)
      - linters:
          - gocritic
        source: //noinspection
      - linters:
          - errorlint
        source: ^\s+if _, ok := err\.\([^.]+\.InternalError\); ok {
      - linters:
          - bodyclose
          - dupl
          - funlen
          - goconst
          - gosec
          - noctx
          - wrapcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 50
formatters:
  enable:
    - gci
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
